# Nginx do HOST (VPS) para o dom\u00ednio queroserdrop.com.br
#
# Pr\u00e9-requisitos na VPS:
#   - Nginx instalado no host (ex.: apt install nginx)
#   - Certificado SSL gerado (ex.: certbot --nginx -d queroserdrop.com.br -d www.queroserdrop.com.br)
#   - docker-compose.yml publicando:
#       frontend  -> 127.0.0.1:8081:80
#       app       -> 127.0.0.1:8080:8080
#
# Instala\u00e7\u00e3o:
#   sudo cp docs/nginx-host-queroserdrop.conf /etc/nginx/sites-available/queroserdrop.com.br
#   sudo ln -s /etc/nginx/sites-available/queroserdrop.com.br /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

# ---------- Redireciona HTTP -> HTTPS ----------
server {
    listen 80;
    listen [::]:80;
    server_name queroserdrop.com.br www.queroserdrop.com.br;

    # Certbot usa esse path para valida\u00e7\u00e3o (n\u00e3o remover)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS: proxy para o frontend (Angular) e /api para o backend ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name queroserdrop.com.br www.queroserdrop.com.br;

    # Caminhos dos certificados (ajuste se necess\u00e1rio; o certbot gera assim por padr\u00e3o)
    ssl_certificate     /etc/letsencrypt/live/queroserdrop.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/queroserdrop.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50m;

    # --- API (Spring Boot) ---
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # --- Uploads (arquivos est\u00e1ticos servidos pelo backend) ---
    location /uploads/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- Swagger (opcional: deixe se quiser acesso p\u00fablico, remova em prod se for o caso) ---
    location /swagger-ui   { proxy_pass http://127.0.0.1:8080; }
    location /swagger-ui/  { proxy_pass http://127.0.0.1:8080; }
    location /v3/api-docs  { proxy_pass http://127.0.0.1:8080; }
    location /v3/api-docs/ { proxy_pass http://127.0.0.1:8080; }

    # --- Frontend (Angular + Nginx dentro do container) ---
    location / {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
