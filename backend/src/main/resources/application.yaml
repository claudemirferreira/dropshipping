# Credenciais (DB, mail, JWT) vêm apenas de variáveis de ambiente. Para dev local use perfil 'dev' ou defina .env (nunca commite .env).
spring:
  application:
    name: dropshipping
  datasource:
    # Credenciais via variáveis de ambiente. Nunca commite valores reais no repositório.
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}?currentSchema=dropshipping
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  flyway:
    enabled: true
    baseline-on-migrate: true
    create-schemas: true
    locations: classpath:db/migration
    validate-on-migrate: true
    # Schema onde rodam as migrations (criado automaticamente se não existir)
    schemas: dropshipping
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: dropshipping
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_FROM}
    password: ${MAIL_PASSWORD}
    recipient: ${MAIL_FIXED_RECIPIENT}
    base-url: ${APP_BASE_URL:http://localhost:8080}
    logo-path: ${APP_EMAIL_LOGO_PATH:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

app:
  upload:
    dir: ${UPLOAD_DIR:uploads}
  api:
    base-url: ${API_BASE_URL:http://localhost:8080}

oci:
  object-storage:
    enabled: ${OCI_OBJECT_STORAGE_ENABLED:false}
    namespace: ${OCI_OS_NAMESPACE:SEU_NAMESPACE_DO_BUCKET}
    bucket-name: ${OCI_OS_BUCKET:SEU_BUCKET}
    region: ${OCI_OS_REGION:sa-saopaulo-1}
    config-profile: ${OCI_OS_PROFILE:DEFAULT}

# Para ver no console se o Flyway está rodando e quais migrações aplica.
# Na VPS, defina LOGGING_LEVEL_ORG_FLYWAYDB=DEBUG no .env para diagnosticar se as migrations rodam.
logging:
  level:
    org.flywaydb: ${LOGGING_LEVEL_ORG_FLYWAYDB:INFO}

jwt:
  # Em produção use JWT_SECRET forte (min 256 bits). Defina via variável de ambiente.
  secret: ${JWT_SECRET}
  access-token-expiration-ms: 1800000
  refresh-token-expiration-ms: 604800000

auth:
  forgot-password-rate-limit-window-minutes: 15
  forgot-password-rate-limit-per-email: 5
  forgot-password-rate-limit-per-ip: 20

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
