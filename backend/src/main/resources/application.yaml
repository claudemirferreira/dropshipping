# Configuração via variáveis de ambiente.
# Local: opcionalmente carrega backend/.env (spring.config.import).
# VPS/Docker: defina as variáveis no arquivo de env (ex.: /root/dropshipping.env) ou no ambiente.
# Todas as chaves abaixo usam sintaxe ${NOME_VAR:valor_default}; sem default, a variável é obrigatória.
spring:
  application:
    name: dropshipping
  datasource:
    # Credenciais via variáveis de ambiente ou .env. Valores padrão para desenvolvimento local.
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=dropshipping
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  flyway:
    enabled: true
    baseline-on-migrate: true
    create-schemas: true
    locations: classpath:db/migration
    validate-on-migrate: true
    # Cria as tabelas no schema dropshipping (postgres → dropshipping)
    schemas: dropshipping
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: dropshipping
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

server:
  port: 8080

app:
  upload:
    dir: ${UPLOAD_DIR}
  api:
    base-url: ${API_BASE_URL}
  mail:
    from: ${MAIL_FROM}
    override-recipient: ${MAIL_FIXED_RECIPIENT}
    base-url: ${API_BASE_URL}
    logo-path: ${APP_EMAIL_LOGO_PATH}

oci:
  object-storage:
    enabled: ${OCI_OBJECT_STORAGE_ENABLED:false}
    namespace: ${OCI_OS_NAMESPACE:SEU_NAMESPACE_DO_BUCKET}
    bucket-name: ${OCI_OS_BUCKET:SEU_BUCKET}
    region: ${OCI_OS_REGION:sa-saopaulo-1}
    config-profile: ${OCI_OS_PROFILE:DEFAULT}

# Para ver no console se o Flyway está rodando e quais migrações aplica.
# Na VPS, defina LOGGING_LEVEL_ORG_FLYWAYDB=DEBUG no .env para diagnosticar se as migrations rodam.
logging:
  level:
    org.flywaydb: ${LOGGING_LEVEL_ORG_FLYWAYDB:INFO}

management:
  health:
    mail:
      enabled: true

jwt:
  # Em produção use JWT_SECRET forte (min 256 bits). Defina via variável de ambiente ou .env.
  secret: ${JWT_SECRET:dev-only-secret-not-for-production-min-32-chars}
  access-token-expiration-ms: 1800000
  refresh-token-expiration-ms: 604800000

auth:
  forgot-password-rate-limit-window-minutes: 15
  forgot-password-rate-limit-per-email: 5
  forgot-password-rate-limit-per-ip: 20

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
