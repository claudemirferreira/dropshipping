# Configuração via variáveis de ambiente.
# Local: opcionalmente carrega backend/.env (spring.config.import).
# VPS/Docker: defina as variáveis no arquivo de env (ex.: /root/dropshipping.env) ou no ambiente.
# Todas as chaves abaixo usam sintaxe ${NOME_VAR:valor_default}; sem default, a variável é obrigatória.
spring:
  application:
    name: dropshipping
  datasource:
    url: jdbc:postgresql://localhost:5432/dropshipping?currentSchema=dropshipping
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  flyway:
    enabled: true
    baseline-on-migrate: true
    create-schemas: true
    locations: classpath:db/migration
    validate-on-migrate: true
    # Cria as tabelas no schema dropshipping (postgres → dropshipping)
    schemas: dropshipping
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: dropshipping
  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: a30d73001@smtp-brevo.com
    password: Y46zCjf72BJ5NrEg
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

app:
  upload:
    dir: uploads
  api:
    base-url: http://localhost:8080
  mail:
    from: moliveiraferreira247@gmail.com
    override-recipient: ""
    base-url: http://localhost:8080
    logo-path: d:\Dropshipping\dropshipping\frontend\public\assets\logo-email.jpeg

oci:
