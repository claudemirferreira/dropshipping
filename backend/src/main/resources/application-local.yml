# Para ver no console se o Flyway está rodando e quais migrações aplica.
# Na VPS, defina LOGGING_LEVEL_ORG_FLYWAYDB=DEBUG no .env para diagnosticar se as migrations rodam.
logging:
  level:
    org.flywaydb: ${LOGGING_LEVEL_ORG_FLYWAYDB:INFO}

management:
